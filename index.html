<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPI - Ekosistem Pi Network</title>
    <style>
        /* Gaya CSS asli Anda tetap dipertahankan penuh di sini */
        :root {
            --pi-color: #e74c3c;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        body {
            margin: 0;
            padding-bottom: 70px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
        }
        main { padding: 16px; }
        .hidden { display: none !important; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background: #ffffff; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            font-size: 11px; color: var(--text-muted); cursor: pointer;
        }
        .nav-item.active { color: #4c1d95; font-weight: bold; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center;
            align-items: center; z-index: 10000; padding: 16px; box-sizing: border-box;
        }
        .modal-content {
            background: white; padding: 24px; border-radius: 16px;
            width: 100%; max-width: 400px; box-sizing: border-box;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 14px; box-sizing: border-box;
        }
        .form-group select:disabled { background: #f1f5f9; cursor: not-allowed; }
    </style>
</head>
<body>

<main>
    <!-- ==================== AREA CARD PROFILE ANDA ==================== -->
    <div id="profile-card" style="background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center;">
        <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 15px;">
            <img id="user-profile-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Foto Profil" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #4c1d95; padding: 3px;">
        </div>
        <h2 id="profile-username" style="margin: 0 0 5px 0; font-size: 20px; font-weight: 700; color: var(--text-main);">Memuat Nama...</h2>
        <p id="profile-address" style="margin: 0 0 15px 0; font-size: 12px; color: var(--text-muted); word-break: break-all; padding: 0 10px;">Belum Terhubung</p>
        <button type="button" onclick="salinWalletUID()" style="background: #f1f5f9; color: #4c1d95; border: none; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;">
            📋 Salin Wallet UID
        </button>
    </div>
    <!-- ============================================================== -->

    <!-- Status Kemitraan Wilayah -->
    <div style="background: white; padding: 16px; border-radius: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 16px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span style="font-size: 12px; font-weight: 700; color: var(--text-muted);">STATUS KEMITRAAN</span>
            <span id="partner-status" style="font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 20px; background: #f1f5f9; color: #475569;">
                MEMUAT...
            </span>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;">
            <div style="padding: 10px; background: #f1f5f9; border-radius: 10px; text-align: center;">
                <p style="margin: 0; font-size: 0.6rem; color: var(--text-muted); font-weight: 600;">LOGISTIK SHARE</p>
                <p id="logistik-share-val" style="margin: 4px 0 0 0; font-size: 0.95rem; font-weight: 800; color: var(--pi-color);">0.00 %</p>
            </div>
            <div style="padding: 10px; background: #f1f5f9; border-radius: 10px; text-align: center;">
                <p style="margin: 0; font-size: 0.6rem; color: var(--text-muted); font-weight: 600;">PRODUK TERPROSES</p>
                <p id="produk-terproses-val" style="margin: 4px 0 0 0; font-size: 0.95rem; font-weight: 800; color: var(--text-main);">0 Item</p>
            </div>
        </div>

        <button type="button" id="btnPerbaruiWilayah" style="width:100%; background:#4c1d95; color:#ffffff; border:none; padding:14px; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 4px 15px rgba(76,29,149,0.3); transition: all 0.3s;">
            PERBARUI / AJUKAN WILAYAH BARU
        </button>
    </div>
</main>

<!-- Modal Form Komunitas / Pengajuan Wilayah -->
<div id="komunitasModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top: 0; margin-bottom: 16px;">Form Registrasi Wilayah</h3>
        <form id="formKomunitas">
            <div class="form-group">
                <label>NAMA LENGKAP</label>
                <input type="text" name="nama" placeholder="Masukkan nama sesuai KTP" required>
            </div>
            <div class="form-group">
                <label>NOMOR WHATSAPP</label>
                <input type="tel" name="whatsapp" placeholder="Contoh: 08123456789" required>
            </div>
            <div class="form-group">
                <label>PROVINSI</label>
                <select id="selectProvinsi" required>
                    <option value="">Pilih Provinsi</option>
                </select>
            </div>
            <div class="form-group">
                <label>KOTA / KABUPATEN</label>
                <select id="selectKota" disabled required>
                    <option value="">Pilih Kota/Kabupaten</option>
                </select>
            </div>
            <div class="form-group">
                <label>KECAMATAN</label>
                <select id="selectKecamatan" disabled required>
                    <option value="">Pilih Kecamatan</option>
                </select>
            </div>
            <div class="form-group">
                <label>KELURAHAN / DESA</label>
                <select id="selectKelurahan" disabled required>
                    <option value="">Pilih Kelurahan</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" onclick="closeKomunitasModal()" style="flex: 1; padding: 12px; background: #e2e8f0; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">BATAL</button>
                <button type="submit" id="btnKirim" style="flex: 1; padding: 12px; background: #4c1d95; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">DAFTAR SEKARANG</button>
            </div>
        </form>
    </div>
</div>

<!-- Halaman Detail Produk -->
<div id="product-detail-page" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto;">
    <div id="detail-content"></div>
</div>

<!-- Navigasi Menu Bawah -->
<nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="switchPage('home')">
        <span class="nav-icon">🏠</span><span class="nav-text">Beranda</span>
    </div>
    <div class="nav-item" id="nav-cari" onclick="switchPage('cari')">
        <span class="nav-icon">🔍</span><span class="nav-text">Cari</span>
    </div>
    <div class="nav-item" id="nav-keranjang" onclick="switchPage('keranjang')">
        <span class="nav-icon">🛒</span><span class="nav-text">Keranjang</span>
    </div>
    <div class="nav-item" id="nav-profile" onclick="switchPage('profile')">
        <span class="nav-icon">👤</span><span class="nav-text">Profil</span>
    </div>
</nav>

<!-- SDK internal & External Extensions -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="app.js?v=4.2"></script>
<script src="/dpi-bot.js"></script>

<script>
    if (typeof currentUser === 'undefined') {
        var currentUser = null;
    }

    const SCRIPT_URL_UTAMA = "https://script.google.com/macros/s/AKfycbxhmcYyT3lBeLrm4dMGotKonJPwT9ZCMU1jRNMBD8CZITVD3Gyreuv_s81Vgw5Kra3b/exec";

    function inisialisasiAutoLoginPi() {
        if (typeof Pi !== 'undefined') {
            Pi.init({ version: "2.0", sandbox: false });
            
            const scopes = ['username', 'payments', 'wallet_address'];
            Pi.authenticate(scopes, onIncompletePaymentFound)
            .then(function(auth) {
                currentUser = auth.user;
                console.log("Auto-login sukses untuk user:", currentUser.username);
                
                const loginBtn = document.getElementById('login-btn');
                if (loginBtn) {
                    loginBtn.innerText = currentUser.username;
                    loginBtn.style.background = "linear-gradient(to right, #2ecc71, #27ae60)";
                    loginBtn.style.color = "white";
                }
                
                const profUser = document.getElementById('profile-username');
                if (profUser) profUser.innerText = currentUser.username;
                
                const profAddr = document.getElementById('profile-address');
                if (profAddr && currentUser.uid) profAddr.innerText = currentUser.uid;

                muatStatusKemitraan();
                muatFotoProfilTervalidasi();
            })
            .catch(function(error) {
                console.error("Gagal melakukan otentikasi otomatis Pi:", error);
            });
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("Ditemukan transaksi tertunda:", payment);
    }

    function handleSignIn() {
        if (currentUser) return; 
        inisialisasiAutoLoginPi();
    }

    function salinWalletUID() {
        const uidText = document.getElementById('profile-address').innerText;
        if(uidText === "Belum Terhubung") {
            alert("⚠️ Wallet UID belum tersedia. Silakan masuk lewat login Pi.");
            return;
        }
        navigator.clipboard.writeText(uidText).then(() => {
            alert("📋 Wallet UID berhasil disalin ke papan klip!");
        }).catch(err => {
            console.error("Gagal menyalin text: ", err);
        });
    }

    function muatFotoProfilTervalidasi() {
        if (!currentUser || !currentUser.uid) return;

        var urlGet = SCRIPT_URL_UTAMA + "?action=ambilProfilUser&uid=" + encodeURIComponent(currentUser.uid);
        
        fetch(urlGet)
        .then(function(res) { return res.json(); })
        .then(function(userData) {
            var profilImg = document.getElementById('user-profile-img');
            if (profilImg) {
                if (userData && userData.statusFoto === "APPROVED") {
                    profilImg.src = userData.urlFotoProfil;
                } else {
                    profilImg.src = (userData && userData.urlFotoLama) || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                }
            }
        })
        .catch(function(err) { 
            console.log("Sinkronisasi foto profil aktif..."); 
        });
    }

    function muatStatusKemitraan() {
        if (!currentUser || !currentUser.uid) return;

        const cekURL = SCRIPT_URL_UTAMA + "?action=cekStatus&uid=" + encodeURIComponent(currentUser.uid);

        fetch(cekURL)
        .then(res => res.json())
        .then(resData => {
            if (resData.status === "ditemukan") {
                const labelStatus = document.getElementById('partner-status');
                if (labelStatus) {
                    labelStatus.innerText = resData.statusKemitraan.toUpperCase();
                    
                    if (resData.statusKemitraan.includes("VERIFIKASI") || resData.statusKemitraan.includes("REVIEW")) {
                        labelStatus.style.background = "#fef3c7"; labelStatus.style.color = "#f59e0b";
                    } else {
                        labelStatus.style.background = "#d1fae5"; labelStatus.style.color = "#065f46";
                    }
                }

                const shareBox = document.getElementById('logistik-share-val');
                if (shareBox && resData.logistikShare !== undefined) {
                    shareBox.innerText = resData.logistikShare + " %";
                }

                const produkBox = document.getElementById('produk-terproses-val');
                if (produkBox && resData.produkTerproses !== undefined) {
                    produkBox.innerText = resData.produkTerproses + " Item";
                }
            }
        })
        .catch(err => console.error("Gagal membaca profil dari Database:", err));
    }

    function toggleMenu() {
        var sideNav = document.getElementById("sideNav");
        if (sideNav) {
            sideNav.style.width = (sideNav.style.width === "280px") ? "0" : "280px";
        }
    }

    function openModal() { document.getElementById("comingSoonModal").style.display = "flex"; }
    function closeModal() { document.getElementById("comingSoonModal").style.display = "none"; }

    function openKomunitasModal() {
        const targetModal = document.getElementById("komunitasModal");
        if (targetModal) targetModal.style.display = "flex";
        var sideNav = document.getElementById("sideNav");
        if(sideNav) sideNav.style.width = "0";
    }

    function closeKomunitasModal() {
        const targetModal = document.getElementById("komunitasModal");
        if (targetModal) targetModal.style.display = "none";
    }

    const form = document.getElementById('formKomunitas');
    if (form) {
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            if (!currentUser || !currentUser.uid) {
                alert("⚠️ Otorisasi login Pi belum terbaca. Harap muat ulang aplikasi Anda.");
                return;
            }

            const namaUser = form.querySelector('[name="nama"]') ? form.querySelector('[name="nama"]').value.trim() : "";
            const waUser = form.querySelector('[name="whatsapp"]') ? form.querySelector('[name="whatsapp"]').value.trim() : "";
            
            const provSelect = document.getElementById('selectProvinsi');
            const kotaSelect = document.getElementById('selectKota');
            const kecSelect = document.getElementById('selectKecamatan');
            const kelSelect = document.getElementById('selectKelurahan');

            const provUser = provSelect ? provSelect.value : "";
            const kotaUser = kotaSelect ? kotaSelect.value : "";
            const kecUser = kecSelect ? kecSelect.value : "";
            const kelUser = kelSelect ? kelSelect.value : "";
            
            if (!namaUser || !waUser || !provUser || !kotaUser || !kecUser || !kelUser) {
                alert("⚠️ Mohon lengkapi semua pilihan wilayah Anda terlebih dahulu!");
                return;
            }

            const btn = document.getElementById('btnKirim');
            if (btn) {
                btn.innerText = "MENGIRIM...";
                btn.disabled = true;
            }
            
            const params = new URLSearchParams({
                action: "gabungKomunitas", 
                nama: namaUser,
                whatsapp: waUser,
                provinsi: provUser,
                kota: kotaUser,
                kecamatan: kecUser,
                kelurahan: kelUser,
                uid: currentUser.uid
            });

            fetch(SCRIPT_URL_UTAMA + "?" + params.toString(), { 
                method: 'POST' 
            })
            .then(response => {
                form.reset();
                closeKomunitasModal();
                tampilkanModalSuksesDigitalTerbaru();
                setTimeout(muatStatusKemitraan, 2000);
            })
            .catch(error => {
                console.error("Eror pengiriman database:", error);
                form.reset();
                tampilkanModalSuksesDigitalTerbaru();
            })
            .finally(() => {
                if (btn) {
                    btn.innerText = "DAFTAR SEKARANG";
                    btn.disabled = false;
                }
            });
        });
    }

    function tutupModalSukses() {
        const suksesModal = document.getElementById("digitalSuksesModal");
        if (suksesModal) suksesModal.style.display = "none";
        if (typeof switchPage === "function") {
            switchPage('home');
        } else {
            window.location.href = "#";
        }
    }

    function bukaGrupWhatsApp() {
        window.open('https://chat.whatsapp.com/JSa1D2JnoNL5HE5ruEuJ5q?s=sw&p=a&mlu=2&amv=1', '_blank');
        const suksesModal = document.getElementById('digitalSuksesModal');
        if (suksesModal) suksesModal.style.display = 'none';
    }

    function tampilkanModalSuksesDigitalTerbaru() {
        let suksesModal = document.getElementById("digitalSuksesModal");
        
        if (!suksesModal) {
            suksesModal = document.createElement("div");
            suksesModal.id = "digitalSuksesModal";
            suksesModal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(6, 2, 14, 0.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); display:flex; justify-content:center; align-items:center; z-index:100005; padding:16px; box-sizing:border-box; font-family:sans-serif;";
            
            suksesModal.innerHTML = `
                <div style="background:linear-gradient(145deg, #160829 0%, #08020e 100%); width:100%; max-width:420px; border-radius:24px; text-align:center; padding:40px 24px 30px; border: 1.5px solid rgba(241, 196, 15, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.5); box-sizing:border-box;">
                    <div style="width:80px; height:80px; background:rgba(0, 240, 225, 0.1); border: 2px solid #00f0e1; border-radius:50%; display:flex; justify-content:center; align-items:center; margin:0 auto 20px;">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#00f0e1" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <h3 style="margin:0 0 10px 0; color:#ffffff; font-size:22px; font-weight:800;">Pendaftaran Berhasil!</h3>
                    <p style="margin:0 0 24px 0; color:#a2b4ca; font-size:13.5px; line-height:1.5;">Data Anda telah aman tersimpan dalam ekosistem database pusat.</p>
                    <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); border-radius:14px; padding:14px; text-align:left; margin-bottom:24px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                            <span style="font-size:11px; color:#6f85a0; font-weight:700;">STATUS</span>
                            <span style="font-size:10px; color:#f39c12; font-weight:800;">PROSES REVIEW</span>
                        </div>
                        <p style="margin:0; font-size:11.5px; color:#8899af; line-height:1.5;">Tim kami sedang melakukan validasi berkas kemitraan wilayah Anda.</p>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button onclick="bukaGrupWhatsApp()" style="width:100%; height:45px; background:#25d366; color:#ffffff; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;">
                            <span>💬</span> GABUNG GRUP WA RESMI
                        </button>
                        <button onclick="tutupModalSukses()" style="width:100%; height:45px; background:transparent; color:#8899af; border:1px solid rgba(255,255,255,0.1); border-radius:12px; font-size:13px; font-weight:600; cursor:pointer;">
                            Kembali ke Beranda
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(suksesModal);
        } else {
            suksesModal.style.display = "flex";
        }
    }

    // --- LOGIKA DROP DOWN WILAYAH BERDASARKAN EMSIFA API ---
    const provSelect = document.getElementById('selectProvinsi');
    const kotaSelect = document.getElementById('selectKota');
    const kecSelect = document.getElementById('selectKecamatan');
    const kelSelect = document.getElementById('selectKelurahan');

    if (provSelect) {
        fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json`)
            .then(res => res.json())
            .then(provinces => {
                provinces.forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p.name;
                    opt.dataset.id = p.id;
                    opt.innerHTML = p.name;
                    provSelect.appendChild(opt);
                });
            })
            .catch(err => console.log("Menunggu koneksi API Wilayah..."));

        provSelect.addEventListener('change', function() {
            const id = this.options[this.selectedIndex].dataset.id;
            resetDropdown(kotaSelect, "Kota/Kabupaten");
            resetDropdown(kecSelect, "Kecamatan");
            resetDropdown(kelSelect, "Kelurahan");
            if(!id) return;
            fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${id}.json`)
                .then(res => res.json())
                .then(data => populate(kotaSelect, data))
                .catch(e => console.log(e));
        });
    }

    if (kotaSelect) {
        kotaSelect.addEventListener('change', function() {
            const id = this.options[this.selectedIndex].dataset.id;
            resetDropdown(kecSelect, "Kecamatan");
            resetDropdown(kelSelect, "Kelurahan");
            if(!id) return;
            fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${id}.json`)
                .then(res => res.json())
                .then(data => populate(kecSelect, data))
                .catch(e => console.log(e));
        });
    }

    // KECAMATAN -> KELURAHAN (Sudah Diperbaiki)
    if (kecSelect) {
        kecSelect.addEventListener('change', function() {
            const id = this.options[this.selectedIndex].dataset.id;
            resetDropdown(kelSelect, "Kelurahan");
            if(!id) return;
            fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/villages/${id}.json`)
                .then(res => res.json())
                .then(data => populate(kelSelect, data))
                .catch(e => console.log("Gagal memuat data Kelurahan:", e));
        });
    }

    function populate(target, data) {
        if (!target) return;
        target.disabled = false;
        data.forEach(d => {
            let opt = document.createElement('option');
            opt.value = d.name;
            opt.dataset.id = d.id;
            opt.innerHTML = d.name;
            target.appendChild(opt);
        });
    }

    function resetDropdown(target, label) {
        if (!target) return;
        target.innerHTML = `<option value="">Pilih ${label}</option>`;
        target.disabled = true;
    }

    window.onclick = function(event) {
        if (event.target.className === "modal-overlay") {
            event.target.style.display = "none";
        }
    }

    function paksaAktifTombolWilayah() {
        try {
            const semuaTombol = document.querySelectorAll("button");
            if (!semuaTombol) return;

            semuaTombol.forEach(btn => {
                if (!btn || !btn.innerText) return; 
                
                const txt = btn.innerText.toUpperCase();
                
                if (txt.includes("AJUKAN") || txt.includes("PERBARUI") || txt.includes("WILAYAH") || txt.includes("GABUNG") || txt.includes("KOMUNITAS")) {
                    btn.disabled = false;
                    btn.style.pointerEvents = "auto";
                    btn.style.cursor = "pointer";
                    
                    if (!btn.hasAttribute('data-click-bound')) {
                        btn.setAttribute('data-click-bound', 'true');
                        btn.removeAttribute("onclick");
                        btn.onclick = null; 
                        
                        btn.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            if (typeof openKomunitasModal === "function") {
                                openKomunitasModal();
                            } else {
                                const modalK = document.getElementById("komunitasModal");
                                if (modalK) modalK.style.display = "flex";
                            }
                        });
                    }
                }
            });
        } catch (error) {
            console.log("Sistem mendeteksi tombol non-teks, diabaikan dengan aman:", error.message);
        }
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        paksaAktifTombolWilayah();
